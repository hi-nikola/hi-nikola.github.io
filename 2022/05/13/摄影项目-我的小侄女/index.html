<p>小孩子对着镜头不会紧张，会自然轻松地展现自己的状态（因此，拍小朋友更多的要采取抓拍，而不是让小孩子摆各种僵硬的动作）我觉得能够抓拍到那份天真的状态，任务就算完成了！当然，拍照全程要靠妈妈哄着，用零食”骗着“才肯乖乖配合。</p>
